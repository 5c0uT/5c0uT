<svg id="gh-dark-mode-only" width="420" height="262" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
  font-size: 14px;
}
#background {
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  fill: white;
  stroke: rgb(225, 228, 232);
  stroke-width: 1px;
  rx: 6px;
  ry: 6px;
}
#gh-dark-mode-only:target #background { fill: #0d1117; stroke-width: 0.5px; }
foreignObject { width: calc(100% - 42px); height: calc(100% - 42px); }
table { width: 100%; border-collapse: collapse; table-layout: auto; }
th { padding: 0 0 8px 0; text-align: left; font-size: 14px; font-weight: 600; color: rgb(3, 102, 214); }
#gh-dark-mode-only:target th { color: #58a6ff; }
td { padding: 3px 0; font-size: 12px; line-height: 18px; color: rgb(88, 96, 105); }
td:last-child { text-align: right; font-weight: 600; }
#gh-dark-mode-only:target td { color: #c9d1d9; }
tr { transform: translateX(-200%); animation: slideIn 1.6s ease-in-out forwards; }
.note { margin-top: 8px; font-size: 11px; color: rgb(110, 118, 129); }
#gh-dark-mode-only:target .note { color: #8b949e; }
@keyframes slideIn { to { transform: translateX(0); } }
</style>
<g>
<rect x="5" y="5" id="background" />
<foreignObject x="21" y="21" width="378" height="220">
<div xmlns="http://www.w3.org/1999/xhtml">
<table>
<thead><tr style="transform: translateX(0);"><th colspan="2">5c0uT&#x27;s All Git Changes</th></tr></thead>
<tbody>
<tr style="animation-delay: 0ms"><td>Repositories scanned</td><td>27</td></tr><tr style="animation-delay: 120ms"><td>Private repositories scanned</td><td>11</td></tr><tr style="animation-delay: 240ms"><td>Repositories with my commits</td><td>11</td></tr><tr style="animation-delay: 360ms"><td>Commits counted</td><td>79</td></tr><tr style="animation-delay: 480ms"><td>Text lines changed</td><td>10,020</td></tr><tr style="animation-delay: 600ms"><td>File changes</td><td>332</td></tr><tr style="animation-delay: 720ms"><td>Binary file changes</td><td>81</td></tr><tr style="animation-delay: 840ms"><td>Tracked text/file changes</td><td>10,101</td></tr>
</tbody>
</table>
<div class="note">Counts git commit diffs across all visible refs; binary files count as file changes, not text lines.</div>
</div>
</foreignObject>
</g>
</svg>
