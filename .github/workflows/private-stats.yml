name: generate private stats

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v6

      - name: Validate required secret
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Missing ACCESS_TOKEN secret. Create a classic personal access token with read:user, user:email, and repo scopes."
            exit 1
          fi

      - name: Download github-stats CLI
        run: |
          curl -L -o /tmp/github-stats \
            https://github.com/jstrieb/github-stats/releases/latest/download/github-stats_x86_64-linux
          chmod +x /tmp/github-stats
          /tmp/github-stats --version

      - name: Generate SVG stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS || secrets.EXCLUDED }}
          EXCLUDE_LANGS: ${{ secrets.EXCLUDE_LANGS || secrets.EXCLUDED_LANGS }}
          EXCLUDE_PRIVATE: "false"
          SILENT: "true"
          MAX_RETRIES: "5"
        run: |
          mkdir -p generated
          cd generated
          /tmp/github-stats

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated
          git commit -m "Update private stats" || exit 0
          git push
