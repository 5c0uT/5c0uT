name: generate private stats

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Checkout stats generator
        uses: actions/checkout@v4
        with:
          repository: jstrieb/github-stats
          path: .tmp/github-stats

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: .tmp/github-stats/requirements.txt

      - name: Validate required secret
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Missing ACCESS_TOKEN secret. Create a personal access token with read:user and repo scopes."
            exit 1
          fi

      - name: Install requirements
        working-directory: .tmp/github-stats
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Generate SVG stats
        working-directory: .tmp/github-stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDED: ${{ secrets.EXCLUDED }}
          EXCLUDED_LANGS: ${{ secrets.EXCLUDED_LANGS }}
          EXCLUDE_FORKED_REPOS: true
        run: python generate_images.py

      - name: Copy generated assets
        run: |
          mkdir -p generated
          cp .tmp/github-stats/generated/*.svg generated/

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/*.svg
          git commit -m "Update private stats" || exit 0
          git push
