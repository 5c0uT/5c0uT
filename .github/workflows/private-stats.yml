name: generate private stats

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: private-stats-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate ACCESS_TOKEN
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          if [ -z "${ACCESS_TOKEN}" ]; then
            echo "Missing ACCESS_TOKEN secret. Create a classic personal access token with repo and read:user scopes. Add user:email for the most accurate changed-lines attribution."
            exit 1
          fi

          headers_file="$(mktemp)"
          curl --fail --silent --show-error --dump-header "${headers_file}" --output /dev/null \
            --header "Authorization: Bearer ${ACCESS_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user

          scopes="$(tr -d '\r' < "${headers_file}" | awk -F': ' 'tolower($1)=="x-oauth-scopes" {print $2}' | tail -n 1)"
          echo "Detected ACCESS_TOKEN scopes: ${scopes:-none or fine-grained token}"

          normalized_scopes=",$(printf '%s' "${scopes}" | tr -d ' '),"
          has_scope() {
            case "${normalized_scopes}" in
              *",$1,"*) return 0 ;;
              *) return 1 ;;
            esac
          }

          has_scope repo || {
            echo "ACCESS_TOKEN must be a classic token with repo scope so private repositories are visible."
            exit 1
          }
          has_scope read:user || has_scope user || {
            echo "ACCESS_TOKEN must include read:user scope so user/repository metadata is available."
            exit 1
          }
          if has_scope user:email || has_scope user; then
            echo "ACCESS_TOKEN includes user:email; changed-lines attribution can use verified email addresses."
          else
            echo "::warning title=ACCESS_TOKEN missing user:email::Generation will continue, but changed-lines attribution can miss commits made with private, old, or otherwise verified emails. Add user:email to ACCESS_TOKEN for the most complete line statistics."
          fi

      - name: Allow stats CLI to clone private repositories
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          git config --global --add url."https://x-access-token:${ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${ACCESS_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Download github-stats CLI
        run: |
          curl --fail --location --output /tmp/github-stats \
            https://github.com/jstrieb/github-stats/releases/latest/download/github-stats_x86_64-linux
          chmod +x /tmp/github-stats
          /tmp/github-stats --version

      - name: Generate SVG stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS }}
          EXCLUDE_LANGS: ${{ secrets.EXCLUDE_LANGS }}
          EXCLUDE_PRIVATE: "false"
          EXCLUDE_PUBLIC: "false"
          SILENT: "true"
          MAX_RETRIES: "5"
        run: |
          mkdir -p generated
          cd generated
          /tmp/github-stats

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/overview.svg generated/languages.svg
          git diff --cached --quiet && exit 0
          git commit -m "Update private stats"
          git push
