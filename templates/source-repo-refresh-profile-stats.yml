name: refresh profile stats

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  refresh-profile-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger profile stats workflow
        env:
          PROFILE_REPOSITORY: 5c0uT/5c0uT
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
        run: |
          if [ -z "${PROFILE_STATS_TOKEN}" ]; then
            echo "Missing PROFILE_STATS_TOKEN secret. Use a token that can dispatch workflows in ${PROFILE_REPOSITORY}."
            exit 1
          fi

          payload="$(jq -nc \
            --arg repo "${GITHUB_REPOSITORY}" \
            --arg sha "${GITHUB_SHA}" \
            '{event_type:"refresh-private-stats", client_payload:{source_repo:$repo, sha:$sha}}')"

          curl --fail --silent --show-error --request POST \
            --url "https://api.github.com/repos/${PROFILE_REPOSITORY}/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${PROFILE_STATS_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "${payload}"
